<form class="container mt-4 p-4 border rounded shadow-sm" id="client-frm">
    <h2 class="mb-4">Personal Information</h2>
    <fieldset id="personal-info">
        <div class="row g-3">
            <div class="col-md-3">
                <label for="first_name" class="form-label">First Name</label>
                <input type="text" class="form-control" id="first_name" required>
            </div>
            <div class="col-md-3">
                <label for="middle_name" class="form-label">Middle Name</label>
                <input type="text" class="form-control" id="middle_name">
            </div>
            <div class="col-md-4">
                <label for="last_name" class="form-label">Last Name</label>
                <input type="text" class="form-control" id="last_name" required>
            </div>
            <div class="col-md-2">
                <label for="ext_name" class="form-label">Suffix</label>
                <input type="text" class="form-control" id="ext_name" placeholder="e.g. Jr, III">
            </div>
            <div class="col-md-4">
                <label for="birth_date" class="form-label">Birth Date</label>
                <input type="date" class="form-control" id="birth_date">
            </div>
            <div class="col-md-4">
                <label for="sex" class="form-label">Sex</label>
                <select class="form-select" id="sex">
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                </select>
            </div>
            <div class="col-md-4">
                <label for="civil_status" class="form-label">Civil Status</label>
                <select class="form-select" id="civil_status">
                    <option value="Single">Single</option>
                    <option value="Married">Married</option>
                    <option value="Legally Separated">Legally Separated</option>
                    <option value="Widowed">Widowed</option>
                </select>
            </div>
            <div class="col-md-4">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" class="form-control" id="email">
            </div>
            <div class="col-md-4">
                <label for="contact_number" class="form-label">Contact Number</label>
                <input type="tel" class="form-control" id="contact_number">
            </div>
            <div class="col-md-4">
                <label for="philhealth_number" class="form-label">PhilHealth Number</label>
                <input type="text" class="form-control" id="philhealth_number">
            </div>
        </div>
    </fieldset>
</form>
