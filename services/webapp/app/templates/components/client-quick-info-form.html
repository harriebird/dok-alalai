<form class="container mt-4 p-4 border rounded shadow-sm" id="client-frm">
    <h2 class="mb-4">Client Information</h2>
    <fieldset id="personal-info">
        <div class="row g-3">
            <div class="col-md-3">
                <label for="first_name" class="form-label">First Name</label>
                <input type="text" class="form-control" id="first_name" required>
            </div>
            <div class="col-md-3">
                <label for="middle_name" class="form-label">Middle Name</label>
                <input type="text" class="form-control" id="middle_name">
            </div>
            <div class="col-md-4">
                <label for="last_name" class="form-label">Last Name</label>
                <input type="text" class="form-control" id="last_name" required>
            </div>
            <div class="col-md-2">
                <label for="ext_name" class="form-label">Suffix</label>
                <input type="text" class="form-control" id="ext_name" placeholder="e.g. Jr, III">
            </div>
        </div>
    </fieldset>
</form>
